# GRUB2 Konfigürasyonu - AtomOS
# BIOS ve UEFI uyumlu

set timeout=5
set default=0

# Platform algılama
if [ "${grub_platform}" = "efi" ]; then
    set efi_mode=true
    echo "UEFI modu tespit edildi"
else
    set efi_mode=false
    echo "BIOS modu tespit edildi"
fi

# Grafik ayarları - platform bazlı
if [ "${efi_mode}" = "true" ]; then
    # UEFI için grafik ayarları (VBE/VGA olmadan)
    insmod efi_gop
    insmod efi_uga
    insmod all_video
else
    # BIOS için grafik ayarları
    insmod vbe
    insmod vga
    insmod video_bochs
    insmod video_cirrus
    insmod all_video
fi

# Temel modüller (platform bağımsız)
insmod normal
insmod part_gpt
insmod part_msdos
insmod fat
insmod ntfs
insmod ext2
insmod iso9660
insmod multiboot2
insmod configfile
insmod echo
insmod test
insmod font
insmod gfxterm

# Terminal ayarları
if terminal_output gfxterm; then
    set gfxmode=auto
    set gfxpayload=keep
else
    terminal_output console
fi

# Font yüklemeye çalış
if [ -f /boot/grub/fonts/unicode.pf2 ]; then
    loadfont /boot/grub/fonts/unicode.pf2
elif [ -f /EFI/BOOT/grub/fonts/unicode.pf2 ]; then
    loadfont /EFI/BOOT/grub/fonts/unicode.pf2
fi

# Grafik modunu ayarla
if [ "${efi_mode}" = "true" ]; then
    # UEFI için yüksek çözünürlük dene
    set gfxmode=1920x1080x32,1366x768x32,1280x1024x32,1024x768x32,800x600x32,auto
else
    # BIOS için güvenli çözünürlükler
    set gfxmode=1024x768x32,800x600x32,640x480x32,auto
fi

set gfxpayload=keep

# Ana menü
menuentry "AtomOS" {
    echo "Loading AtomOS kernel..."
    if [ "${efi_mode}" = "true" ]; then
        echo "UEFI modunda başlatılıyor..."
    else
        echo "BIOS modunda başlatılıyor..."
    fi
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "AtomOS (Text Mode)" {
    echo "Loading AtomOS kernel in text mode..."
    set gfxpayload=text
    if [ "${efi_mode}" = "true" ]; then
        echo "UEFI text modunda başlatılıyor..."
    else
        echo "BIOS text modunda başlatılıyor..."
    fi
    multiboot2 /boot/kernel.elf
    boot
}

menuentry "AtomOS (Safe Graphics)" {
    echo "Loading AtomOS kernel with safe graphics..."
    set gfxmode=640x480x32
    set gfxpayload=keep
    if [ "${efi_mode}" = "true" ]; then
        echo "UEFI güvenli grafik modunda başlatılıyor..."
    else
        echo "BIOS güvenli grafik modunda başlatılıyor..."
    fi
    multiboot2 /boot/kernel.elf
    boot
}

if [ "${efi_mode}" = "true" ]; then
    menuentry "AtomOS (UEFI High Resolution)" {
        echo "Loading AtomOS kernel with high resolution..."
        set gfxmode=1920x1080x32,1366x768x32,auto
        set gfxpayload=keep
        echo "UEFI yüksek çözünürlük modunda başlatılıyor..."
        multiboot2 /boot/kernel.elf
        boot
    }
fi

menuentry "System Information" {
    echo "===== AtomOS System Information ====="
    echo "Platform: ${grub_platform}"
    echo "CPU: ${grub_cpu}"
    if [ "${efi_mode}" = "true" ]; then
        echo "Boot Mode: UEFI"
        echo "SecureBoot: Not checked"
    else
        echo "Boot Mode: BIOS/Legacy"
    fi
    echo "GRUB Version: ${grub_version}"
    echo ""
    echo "Available video modes:"
    videotest
    echo ""
    echo "Press any key to return to menu..."
    read
}

menuentry "Memory Test" {
    echo "===== Memory Information ====="
    echo "This would show memory information"
    echo "when memory detection is implemented."
    echo ""
    echo "Platform: ${grub_platform}"
    if [ "${efi_mode}" = "true" ]; then
        echo "EFI memory map will be available to kernel"
    else
        echo "E820 memory map will be available to kernel"
    fi
    echo ""
    echo "Press any key to return to menu..."
    read
}

if [ "${efi_mode}" = "true" ]; then
    menuentry "UEFI Firmware Setup" {
        echo "Attempting to enter UEFI firmware setup..."
        fwsetup
    }
fi

menuentry "Reboot" {
    echo "Rebooting system..."
    reboot
}

menuentry "Shutdown" {
    echo "Shutting down system..."
    halt
}